<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Thế Giới Công Nghệ</title>
        <link rel="shortcut icon" href="./assets/img/logo.ico" type="image/x-icon">

        <!-- Font Awesome -->
        <link rel="stylesheet" href="./assets/data/fontawesome/css/all.min.css">

        <!-- Css -->
        <link rel="stylesheet" href="./assets/css/base.css">
        <link rel="stylesheet" href="./assets/css/header.css">
        <link rel="stylesheet" href="./assets/css/navtop.css">
        <link rel="stylesheet" href="./assets/css/animation.css">
        <link rel="stylesheet" href="./assets/css/auth.css">

        <!-- Js -->
        <script src="./assets/data/products.js"></script>
    </head>
    <body>
        <div id="wrapper">
            <div id="header__container">
                <section>
                    <div id="navtop">
                        <div class="navtop-left">
                            <div id="home" href="">
                                Trang Chủ
                            </div>
                            <div href="" class="app_download">
                                Tải ứng dụng
                            </div>
                        </div>
                        <div class="navtop-right">
                            <div class="help">
                                Hỗ Trợ
                            </div>
                            <div class="language">
                                Tiếng Việt
                                <i class="fa-solid fa-chevron-down"></i>

                                <ul class="language_change">
                                    <li>
                                        Tiếng Việt
                                        <i class="fa-solid fa-check"></i>
                                    </li>
                                    <li>
                                        English
                                    </li>
                                </ul>
                            </div>
                            <div class="register">
                                Đăng Ký
                            </div>
                            <div class="login">
                                Đăng Nhập
                            </div>
                        </div>
                        <div class="clear"></div>
                    </div>
                    <div id="header">
                        <div class="header__logo">
                            <a href="" class="header__logo-link">
                                <img src="./assets/img/logo.png" alt="" class="header__logo-img">
                            </a>
                        </div>
                        
                        <div class="header__search">
                            <form action="" method="get" class="search_box">
                                <div class="autoComplete">
                                    <input type="text" class="header__search-input" name="search" placeholder="Nhập từ khóa tìm kiếm...">
                                    <button type="submit" class="header__search-btn">
                                        <i class="fa-solid fa-magnifying-glass"></i>
                                    </button>
                                </div>
                            </form>
                        </div>
                        
                        <div class="header__tool">
                            <i class="fa-solid fa-bell"></i>
                            <i class="fa-solid fa-cart-shopping"></i>
                        </div>
                    </div>
                </section>
            </div>


            <div id="container"></div>

            <div id="footer"></div>
        </div>

        <div class="form-container">
            <div class="form-content">
                <i class="fa-solid fa-xmark"></i>
                <!-- Form Đăng Nhập -->
                <div class="form-box" id="login-form">
                    <h2>Đăng Nhập</h2>
                    <form action="#" method="post">
                        <div class="input-group">
                            <label for="login-email" name="email">Email:</label>
                            <input type="email" name="email" id="login-email" name="email" required>
                        </div>
                        <div class="input-group">
                            <label for="login-password">Mật khẩu:</label>
                            <input type="password" id="login-password" name="password" required>
                        </div>
                        <button class="btn__submit" type="submit">Đăng Nhập</button>
                        <p class="auth__text register__text">Bạn chưa có tài khoản? 
                            <a href="#register-form">Đăng Ký</a>
                        </p>
                    </form>
                </div>
            
                <!-- Form Đăng Ký -->
                <div class="form-box" id="register-form" style="display: none;">
                    <h2>Đăng Ký</h2>
                    <form action="#" method="post">
                        <div class="input-group">
                            <label for="register-name">Họ và Tên:</label>
                            <input type="text" id="register-name" name="name" required>
                        </div>
                        <div class="input-group">
                            <label for="register-email">Email:</label>
                            <input type="email" id="register-email" name="email" required>
                        </div>
                        <div class="input-group">
                            <label for="register-password">Mật khẩu:</label>
                            <input type="password" id="register-password" name="password" required>
                        </div>
                        <button class="btn__submit" type="submit">Đăng Ký</button>
                        <p class="auth__text login__text">Bạn đã có tài khoản? 
                            <a href="#login-form">Đăng Nhập</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
