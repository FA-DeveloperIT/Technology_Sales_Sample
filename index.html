<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Thế Giới Công Nghệ</title>
        <link rel="shortcut icon" href="./assets/img/logo.ico" type="image/x-icon">

        <!-- Font Awesome -->
        <link rel="stylesheet" href="./assets/data/fontawesome/css/all.min.css">

        <!-- Css -->
        <link rel="stylesheet" href="./assets/css/base.css">
        <link rel="stylesheet" href="./assets/css/header.css">
        <link rel="stylesheet" href="./assets/css/navtop.css">

        <!-- Js -->
        <script src="./assets/data/products.js"></script>
    </head>
    <body>
        <div id="wrapper">
            <div id="header__container">
                <section>
                    <div id="navtop">
                        <div class="navtop-left">
                            <div id="home" href="">
                                Trang Chủ
                            </div>
                            <div href="" class="app_download">
                                Tải ứng dụng
                            </div>
                        </div>
                        <div class="navtop-right">
                            <div class="help">
                                Hỗ Trợ
                            </div>
                            <div class="language">
                                Tiếng Việt
                                <i class="fa-solid fa-chevron-down"></i>

                                <ul class="language_change">
                                    <li>
                                        Tiếng Việt
                                        <i class="fa-solid fa-check"></i>
                                    </li>
                                    <li>
                                        English
                                    </li>
                                </ul>
                            </div>
                            <div class="register">
                                Đăng Ký
                            </div>
                            <div class="login">
                                Đăng Nhập
                            </div>
                        </div>
                        <div class="clear"></div>
                    </div>
                    <div id="header">
                        <div class="header__logo">
                            <a href="" class="header__logo-link">
                                <img src="./assets/img/logo.png" alt="" class="header__logo-img">
                            </a>
                        </div>
                        
                        <div class="header__search">
                            <form action="" method="get" class="search_box">
                                <div class="autoComplete">
                                    <input type="text" class="header__search-input" name="search" placeholder="Nhập từ khóa tìm kiếm...">
                                    <button type="submit" class="header__search-btn">
                                        <i class="fa-solid fa-magnifying-glass"></i>
                                    </button>
                                </div>
                            </form>
                        </div>
                        
                        <div class="header__tool">
                            <i class="fa-solid fa-bell"></i>
                            <i class="fa-solid fa-cart-shopping"></i>
                        </div>
                    </div>
                </section>
            </div>


            <div id="container"></div>

            <div id="footer"></div>
        </div>
    </body>
</html>
